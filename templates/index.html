<!DOCTYPE html>
<html>
<head><title>Expense Tracker</title></head>
<body>
    <h1>My Expenses</h1>
    <h2>Total Spent: GHS {{ "%.2f"|format(total) }}</h2>
    
    <h3>Add Expense</h3>
    <form method="POST" action="/add">
        <select name="category" required>
            <option>Food</option><option>Transport</option><option>Data</option><option>Other</option>
        </select>
        <input name="amount" type="number" step="0.01" placeholder="Amount GHS" required>
        <input name="note" placeholder="Note">
        <button type="submit">Add</button>
    </form>
    
    <h3>History</h3>
    <table border="1">
        <tr><th>Date</th><th>Category</th><th>Amount</th><th>Note</th></tr>
        {% for e in expenses %}
        <tr><td>{{ e.date }}</td><td>{{ e.category }}</td><td>GHS {{ e.amount }}</td><td>{{ e.note }}</td></tr>
        {% endfor %}
    </table>
</body>
</html>
